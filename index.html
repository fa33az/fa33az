<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="MtZROleuGHFePQgXRwrmGrCqx5EIZGhkJdEp5DjZwsg" />
    <title>faw-waz.xyz</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --cat-color: #f1f2f6;
            --cat-shadow: #d1d2d6;
            --accent-color: #ff7a90;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1b1b22 0%, #0a0a0d 100%);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Ambient glowing background circles */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 122, 144, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            filter: blur(40px);
            animation: pulse-glow 6s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* Glass container */
        .container {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Cute sleeping/purring cat */
        .cat-container {
            position: relative;
            width: 200px;
            height: 160px;
            margin-bottom: 10px;
        }

        .cat {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 90px;
            background-color: var(--cat-color);
            border-radius: 70px 70px 60px 60px;
            animation: breathe 3.5s infinite ease-in-out;
            box-shadow: inset -10px -10px 0 var(--cat-shadow);
        }

        /* Head */
        .cat-head {
            position: absolute;
            top: -45px;
            left: 10px;
            width: 75px;
            height: 70px;
            background-color: var(--cat-color);
            border-radius: 40px 40px 35px 35px;
            box-shadow: inset -5px -5px 0 var(--cat-shadow);
        }

        /* Ears */
        .ear {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }

        .ear-left {
            top: -12px;
            left: 5px;
            border-width: 0 15px 25px 5px;
            border-color: transparent transparent var(--cat-color) transparent;
            transform: rotate(-15deg);
        }

        .ear-left::after {
            content: '';
            position: absolute;
            top: 5px;
            left: -5px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 10px 18px 4px;
            border-color: transparent transparent var(--accent-color) transparent;
        }

        .ear-right {
            top: -12px;
            right: 5px;
            border-width: 0 5px 25px 15px;
            border-color: transparent transparent var(--cat-color) transparent;
            transform: rotate(15deg);
        }

        .ear-right::after {
            content: '';
            position: absolute;
            top: 5px;
            right: -5px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 4px 18px 10px;
            border-color: transparent transparent var(--accent-color) transparent;
        }

        /* Eyes (Sleeping/Purring) */
        .eyes {
            position: absolute;
            top: 32px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .eye {
            width: 12px;
            height: 6px;
            border: 2px solid #5d5d6a;
            border-top: 0;
            border-radius: 0 0 12px 12px;
        }

        /* Nose & Whiskers */
        .nose {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 4px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }

        .whiskers {
            position: absolute;
            top: 40px;
            width: 100%;
        }

        .whisker-l1, .whisker-l2, .whisker-r1, .whisker-r2 {
            position: absolute;
            width: 18px;
            height: 1.5px;
            background-color: #a0a0b0;
        }

        .whisker-l1 { left: -8px; transform: rotate(10deg); }
        .whisker-l2 { left: -8px; top: 5px; transform: rotate(-5deg); }
        .whisker-r1 { right: -8px; transform: rotate(-10deg); }
        .whisker-r2 { right: -8px; top: 5px; transform: rotate(5deg); }

        /* Tail */
        .tail {
            position: absolute;
            right: -15px;
            bottom: 15px;
            width: 40px;
            height: 45px;
            border: 15px solid var(--cat-color);
            border-left: 0;
            border-bottom: 0;
            border-radius: 0 40px 40px 0;
            transform-origin: left bottom;
            animation: wag 3.5s infinite ease-in-out;
            box-shadow: inset -5px 5px 0 var(--cat-shadow);
        }

        /* Paw */
        .paw {
            position: absolute;
            bottom: -5px;
            left: 20px;
            width: 22px;
            height: 14px;
            background-color: var(--cat-color);
            border-radius: 10px 10px 0 0;
            box-shadow: inset -2px -2px 0 var(--cat-shadow);
        }

        .paw-right {
            left: 48px;
        }

        /* Zzz purr animation */
        .zzzs {
            position: absolute;
            top: -10px;
            right: 25px;
            width: 50px;
            height: 50px;
        }

        .z {
            position: absolute;
            color: var(--accent-color);
            font-family: inherit;
            font-weight: bold;
            opacity: 0;
            animation: float-z 4s infinite linear;
        }

        .z1 { animation-delay: 0s; font-size: 14px; }
        .z2 { animation-delay: 1.3s; right: -10px; top: -10px; font-size: 18px; }
        .z3 { animation-delay: 2.6s; right: -20px; top: -20px; font-size: 22px; }

        /* Keyframes */
        @keyframes breathe {
            0%, 100% {
                transform: translateX(-50%) scale(1);
            }
            50% {
                transform: translateX(-50%) scale(1.04, 0.96);
            }
        }

        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        @keyframes float-z {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translate(20px, -40px) scale(1.2); opacity: 0; }
        }

        /* Interactive pulse circle under the cat */
        .pulse-ring {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 18px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            z-index: 0;
        }

        .pulse-ring::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 122, 144, 0.25);
            animation: ring-ripple 3.5s infinite ease-out;
        }

        @keyframes ring-ripple {
            0% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        h1 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            letter-spacing: 2px;
            margin: 15px 0 0 0;
            font-weight: 300;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="container">
        <div class="cat-container">
            <div class="pulse-ring"></div>
            <div class="cat">
                <div class="cat-head">
                    <div class="ear ear-left"></div>
                    <div class="ear ear-right"></div>
                    <div class="eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="nose"></div>
                    <div class="whiskers">
                        <div class="whisker-l1"></div>
                        <div class="whisker-l2"></div>
                        <div class="whisker-r1"></div>
                        <div class="whisker-r2"></div>
                    </div>
                </div>
                <div class="paw paw-left"></div>
                <div class="paw paw-right"></div>
                <div class="tail"></div>
            </div>
            <div class="zzzs">
                <div class="z z1">z</div>
                <div class="z z2">z</div>
                <div class="z z3">Z</div>
            </div>
        </div>
        <h1>meow...</h1>
    </div>
</body>
</html>
